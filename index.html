<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#16213e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Debt Collector</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top Bar -->
  <div class="top-bar">
    <div id="topLeft">
      <h1>Debt Collector</h1>
    </div>
    <div class="top-actions" id="topActions"></div>
  </div>

  <!-- ═══ DASHBOARD PAGE ═══ -->
  <div id="pageDashboard" class="page active">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="section-header">
      <h2>Recent Activity</h2>
    </div>
    <div id="recentActivity"></div>
  </div>

  <!-- ═══ DEBTORS PAGE ═══ -->
  <div id="pageDebtors" class="page">
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchDebtors" placeholder="Search debtors...">
    </div>
    <div id="debtorsList"></div>
  </div>

  <!-- ═══ DEBTOR DETAIL PAGE ═══ -->
  <div id="pageDebtorDetail" class="page">
    <div id="debtorDetailContent"></div>
  </div>

  <!-- ═══ DEBT DETAIL PAGE ═══ -->
  <div id="pageDebtDetail" class="page">
    <div id="debtDetailContent"></div>
  </div>

  <!-- ═══ ALL DEBTS PAGE ═══ -->
  <div id="pageDebts" class="page">
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchDebts" placeholder="Search debts...">
    </div>
    <div id="debtsList"></div>
  </div>

  <!-- ═══ SETTINGS PAGE ═══ -->
  <div id="pageSettings" class="page">
    <div class="card">
      <h3 style="margin-bottom: 16px;">Settings</h3>
      <div class="form-group">
        <label>Currency Symbol</label>
        <input type="text" id="settingCurrency" value="$" maxlength="5">
      </div>
      <div class="form-group">
        <label>Default Interest Rate (%)</label>
        <input type="number" id="settingInterest" value="0" step="0.1" min="0">
      </div>
      <button class="btn btn-primary btn-block mt-8" onclick="saveSettings()">Save Settings</button>
    </div>
    <div class="card mt-16">
      <h3 style="margin-bottom: 16px;">Data</h3>
      <button class="btn btn-outline btn-block mb-12" onclick="exportData()">Export Data (JSON)</button>
      <button class="btn btn-outline btn-block mb-12" onclick="document.getElementById('importFile').click()">Import Data (JSON)</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      <button class="btn btn-danger btn-block" onclick="clearAllData()">Clear All Data</button>
    </div>
    <div class="card mt-16">
      <h3 style="margin-bottom: 12px;">About</h3>
      <p style="color: var(--text2); font-size: .85rem;">Debt Collector PWA v1.0<br>Track debts, payments & instalments.<br>Works offline on any device.</p>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fabBtn" onclick="onFabClick()">+</button>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button data-page="pageDashboard" class="active" onclick="showPage('pageDashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </button>
    <button data-page="pageDebtors" onclick="showPage('pageDebtors')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      Debtors
    </button>
    <button data-page="pageDebts" onclick="showPage('pageDebts')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M2 9h20"/><path d="M9 21V9"/></svg>
      Debts
    </button>
    <button data-page="pageSettings" onclick="showPage('pageSettings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Settings
    </button>
  </nav>

  <!-- Modal Container -->
  <div id="modalContainer"></div>
  <!-- Confirm Container -->
  <div id="confirmContainer"></div>

  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
